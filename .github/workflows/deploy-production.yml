# .github/workflows/deploy-production.yml
name: Deploy to Production

on:
  workflow_dispatch: # Triggered manually from GitHub → Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy backend to Production
        run: railway up --environment production --service code-impact-training/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
      - name: Deploy frontend to Production
        run: railway up --environment production --service code-impact-training/frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
