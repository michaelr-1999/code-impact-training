name: Deploy Dev

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build backend
        run: npm ci && npm run build
        working-directory: backend
      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend
